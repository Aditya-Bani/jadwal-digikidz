<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background: radial-gradient(circle at top right, #dbe1ff 0%, #f7f9fb 60%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bounce-in {
            animation: bounceIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="font-body-md text-on-surface flex flex-col items-center justify-between p-margin-mobile">
<!-- Top Navigation Placeholder (Suppressed as per "The Destination Rule" for login screens) -->
<main class="w-full max-w-md flex flex-col items-center gap-8 py-8">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-4">
<div class="w-48 h-auto">
<img alt="Digikidz Logo" class="w-full h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwr6Uty_joqqIPOX9LfBP6yWTAsvsaTSD92o__NjpIsON6kyz_aqy4TXGIolCgy6Yrbb4NG3Hr_9dNJU1jlcfz8wjghRCZ4JIwEg7czeLlA4KeFzKcI9RWRMTi9viCUydrLwVK0lZavcLPCmadrEfFZ7lH91KRefVtpE2yjQzq2WdtOGOcpX5zd5RuPXiMmEiXOgGOfWkITp63xGYdQsdcgLPYItBivgQlPrX77-ON3HtP9pVFSlGuJ3nkEShPj0ZAYm8eaVzvZ4A"/>
</div>
<div class="space-y-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Welcome Parents</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                    Enter your unique access code to view your child's progress.
                </p>
</div>
</header>
<!-- Mascot Image -->
<div class="w-48 md:w-56 bounce-in">
<img alt="Cheerful Digikidz Mascot" class="w-full h-auto drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9WrhERSiTw3Fbo7jt-0dt5kNMkgUFYKZsUlhqt-pJ_Rh9AP8Q-rx0af71jryUr_S_uqR6h_gNCxYADVrXnAuecK1Y6KpUtZ0B7M6IxML0XKTg8GeJPFNlzYxpw8A1UBkrimQ9vh3pGpfdkKtrCwYSQGCz8_X2fYbSEhbvDkWx5LR3pw8hOgRzWHJYmRVIK3SWTboukKDdw0PLfgwujcXv67QMPGiC7bqDcFVUfkfbwhHVkyf7aDQu_Lkh8_ZOgoLKaHu5WmVi4Gw"/>
</div>
<!-- Login Card -->
<div class="glass-panel w-full rounded-xl p-8 shadow-lg shadow-primary/5">
<form class="space-y-6" id="loginForm">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="access-code">
                        Access Code
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full h-14 pl-12 pr-4 bg-white/50 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all text-body-md outline-none" id="access-code" placeholder="Enter PIN (e.g. 12345)" required="" type="text"/>
</div>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md rounded-lg flex items-center justify-center gap-2 shadow-md shadow-primary/20 active:scale-95 transition-all duration-150" id="submitBtn" type="submit">
                    Access Portal
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Footer Help -->
<footer class="mt-auto pb-6">
<a class="font-label-md text-label-md text-primary hover:underline transition-all flex items-center gap-1" href="#">
            Need help? Contact Support
        </a>
</footer>
<script>
        // Micro-interactions
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            submitBtn.innerHTML = `
                <div class="w-5 h-5 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></div>
                Connecting...
            `;
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.8';
            
            // Mock navigation delay
            setTimeout(() => {
                alert('Success! Redirecting to your child\'s dashboard...');
                // Reset for demo purposes
                submitBtn.innerHTML = 'Access Portal <span class="material-symbols-outlined">arrow_forward</span>';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }, 1500);
        });

        // Add touch scale effect for mobile
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('touchstart', () => {
                el.style.transform = 'scale(0.98)';
            });
            el.addEventListener('touchend', () => {
                el.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
