<!DOCTYPE html>

<html class="light" lang="id"><head>

      tailwind.config = {

          extend: {
            "colors": {
                    "on-background": "#191c1e",
                    "surface-container-high": "#e6e8ea",
                    "on-surface-variant": "#434655",
                    "on-tertiary-fixed": "#002109",
                    "primary-fixed": "#dbe1ff",
                    "on-tertiary-fixed-variant": "#005321",
                    "primary": "#004ac6",
                    "inverse-surface": "#2d3133",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed": "#341100",
                    "on-primary-fixed-variant": "#003ea8",
                    "error": "#ba1a1a",
                    "outline": "#737686",
                    "background": "#f7f9fb",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#783200",
                    "surface": "#f7f9fb",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#b4c5ff",
                    "surface-container-low": "#f2f4f6",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#ffb690",
                    "on-surface": "#191c1e",
                    "tertiary-container": "#007e37",
                    "secondary": "#9d4300",

                    "surface-variant": "#e0e3e5",
                    "inverse-on-surface": "#eff1f3",
                    "tertiary": "#006229",
                    "secondary-container": "#fd761a",
                    "tertiary-fixed": "#6bff8f",
                    "surface-dim": "#d8dadc",
                    "surface-container-highest": "#e0e3e5",
                    "secondary-fixed": "#ffdbca",

                    "primary-fixed-dim": "#b4c5ff",
                    "on-tertiary-container": "#c1ffc5",
                    "surface-tint": "#0053db",
                    "surface-bright": "#f7f9fb",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#5c2400",
                    "surface-container": "#eceef0",
                    "on-primary-container": "#eeefff",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding": "32px",
                    "margin-desktop": "40px",
                    "base": "8px",
                    "margin-mobile": "16px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],

                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .bg-mesh {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 74, 198, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(180, 197, 255, 0.1) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex flex-col items-center justify-between text-on-surface">
<!-- Top Section: Branding -->
<header class="w-full flex flex-col items-center pt-12 px-margin-mobile">
<img alt="Digikidz Logo" class="h-14 object-contain mb-8" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUmO49blvxeKjee7hC61UlLzD6gm5u5nJQTmRGEjVz4NmG6I-tFsP4sE0sf18QS-y3XQjgESe37tfFE5lg_g_UzDXGRHnJp44LEo5d5WDIKrRoyxvSmyWHJEzHvhioLrMJIwPc3suVMNUYJhVUyqsgnKq4uKcOuFJN6xuInbncFwoIRjmzKOOVNadmLqLjVFe7KXJvD59l3blHbcUtAu6prqHERlrPs_XheNqG7mL5akA4imMVqhba8LgG1j0UKFwHUrp2o7njaPQ"/>
<div class="relative w-40 h-40 mb-6 group">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl group-hover:bg-primary/20 transition-all duration-500"></div>
<img alt="Digikidz Mascot" class="relative z-10 w-full h-full object-contain transform group-hover:scale-105 transition-transform duration-300" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_C78yabBlEwfbJkWdh-Adk7PGerwpiBe7lOEX3ISU3KeDYqiBtFIC4RmW5UQYIo_EokpyzzqLr05B4NaNoLpvKsmjVbHDVIY1Y7AjfFkN9H3pe0lwEJGrgpItVAWYd8IRG9hrM1EJbyrfFJW_OC3Qn_9VZzohyV-e_6GvkaQq1qDCiHi34dF1LZWZLxFwFddjkwH8IOjF5WCFPYGRc7DvulCN5dsIGwwDgxl08TJ46YaUdCgkVVF9U4zoTC77_I3V2S68uwj4QQQ"/>
</div>
<div class="text-center space-y-2">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-primary tracking-tight">Halo, Coach Hebat!</h1>
<p class="text-body-md font-body-md text-on-surface-variant">Siap membimbing generasi cerdas hari ini?</p>
</div>
</header>
<!-- Main Content: Login Form Card -->
<main class="w-full px-margin-mobile my-10 max-w-md">
<div class="glass-card rounded-lg p-6 shadow-xl shadow-primary/5">
<form class="space-y-5" id="loginForm" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-label-md font-label-md text-on-surface-variant block ml-1" for="email">Email Coach</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-11 pr-4 text-body-md font-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="email" placeholder="nama@digikidz.id" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-label-md font-label-md text-on-surface-variant block" for="password">Kata Sandi</label>
<a class="text-label-sm font-label-sm text-primary hover:underline" href="#">Lupa Sandi?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-11 pr-11 text-body-md font-body-md focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1 pt-1">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 focus:ring-offset-0 transition-all cursor-pointer" id="remember" type="checkbox"/>
</div>
<label class="text-label-md font-label-md text-on-surface-variant cursor-pointer select-none" for="remember">
                        Tetap masuk selama 30 hari
                    </label>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-[0.98] transition-all mt-4" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<span class="text-body-lg font-bold">Masuk ke Portal</span>
</button>
</form>
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-on-surface-variant">
<div class="h-px w-8 bg-outline-variant"></div>
<span class="text-label-sm font-label-sm">Butuh bantuan?</span>
<div class="h-px w-8 bg-outline-variant"></div>
</div>
<button class="flex items-center gap-2 text-primary font-bold hover:text-primary-container transition-colors group">
<span class="material-symbols-outlined">support_agent</span>
<span class="text-label-md font-label-md">Hubungi Admin</span>
<span class="material-symbols-outlined text-sm transform group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Footer Links -->
<footer class="w-full pb-8 px-margin-mobile">
<div class="flex flex-wrap justify-center gap-x-6 gap-y-2 mb-4">
<a class="text-label-sm font-label-sm text-outline hover:text-primary transition-colors" href="#">Pusat Bantuan</a>
<a class="text-label-sm font-label-sm text-outline hover:text-primary transition-colors" href="#">Kebijakan Privasi</a>
<a class="text-label-sm font-label-sm text-outline hover:text-primary transition-colors" href="#">Syarat &amp; Ketentuan</a>
</div>
<p class="text-center text-label-sm font-label-sm text-outline/60">
            © 2024 Digikidz MIS. All rights reserved.
        </p>
</footer>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Add subtle animation to mascot on page load
        window.onload = () => {
            const mascot = document.querySelector('img[src*="IMAGE_25"]');
            mascot.classList.add('animate-bounce');
            setTimeout(() => {
                mascot.classList.remove('animate-bounce');
            }, 1000);
        };
    </script>
</body></html>
